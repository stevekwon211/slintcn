<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>slintcn — copy-paste Slint components</title>
    <meta name="description" content="Copy-paste Slint components that don't look like 2009 desktop widgets. Live interactive showcase built with Slint compiled to WebAssembly.">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,&lt;svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22%23fafafa%22&gt;&lt;circle cx=%2212%22 cy=%2212%22 r=%229%22 fill=%22%23171717%22 stroke=%22%23fafafa%22 stroke-width=%221.5%22/&gt;&lt;/svg&gt;">
    <style>
        :root {
            color-scheme: dark;
        }
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #0a0a0a;
            color: #fafafa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
            overflow: hidden;
        }
        #status {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            background: #0a0a0a;
            transition: opacity 200ms ease;
            z-index: 10;
        }
        #status.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .spinner {
            width: 32px;
            height: 32px;
            border: 2px solid #262626;
            border-top-color: #fafafa;
            border-radius: 50%;
            animation: spin 700ms linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .label {
            color: #a1a1a1;
            font-size: 13px;
            font-weight: 500;
        }
        .brand {
            color: #fafafa;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.01em;
        }
        canvas {
            outline: none;
            display: block;
        }
    </style>
</head>
<body>
    <div id="status">
        <div class="brand">slintcn</div>
        <div class="spinner"></div>
        <div class="label">Compiling Slint WebAssembly bundle (~7 MB)…</div>
    </div>

    <canvas id="canvas"></canvas>

    <script type="module">
        import init from './pkg/slintcn-showcase.js';
        try {
            await init();
            document.getElementById('status').classList.add('hidden');
        } catch (err) {
            const status = document.getElementById('status');
            status.innerHTML = `
                <div class="brand">slintcn</div>
                <div class="label" style="color:#ff6467;max-width:520px;text-align:center">
                    Failed to load WebAssembly bundle.<br>
                    <code style="font-size:11px;opacity:0.7">${err}</code>
                </div>
            `;
            console.error(err);
        }
    </script>
</body>
</html>
