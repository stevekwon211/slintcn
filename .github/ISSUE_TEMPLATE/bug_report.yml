name: Bug report
description: Report a reproducible problem in slintcn.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include commands, component names, or a minimal Slint snippet.
      placeholder: |
        npx slintcn@latest init
        npx slintcn@latest add button
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: slintcn version
      placeholder: 0.18.0
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, Rust version, Slint version, and package manager.
